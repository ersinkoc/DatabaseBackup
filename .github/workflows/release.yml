name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Version string to stamp into binaries
        required: true
        default: dev

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Test
        run: go test ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Build release artifacts
        env:
          VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          VERSION="$VERSION" COMMIT="${COMMIT::12}" BUILD_DATE="$BUILD_DATE" ./scripts/release.sh
          VERSION="$VERSION" COMMIT="${COMMIT::12}" BUILD_DATE="$BUILD_DATE" BUILDER="github-actions:${GITHUB_RUN_ID}" ./scripts/provenance.sh
          VERSION="$VERSION" COMMIT="${COMMIT::12}" BUILD_DATE="$BUILD_DATE" ./scripts/sbom.sh

      - name: Verify checksums
        run: |
          ./scripts/verify-release.sh bin
          KRONOS_REQUIRE_GOVULNCHECK=1 ./scripts/verify-sbom.sh bin
          ./scripts/smoke-release.sh bin

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-path: |
            bin/kronos-linux-amd64
            bin/kronos-linux-arm64
            bin/kronos-darwin-amd64
            bin/kronos-darwin-arm64

      - name: Attest SBOM
        uses: actions/attest@v4.1.0
        with:
          subject-path: |
            bin/kronos-linux-amd64
            bin/kronos-linux-arm64
            bin/kronos-darwin-amd64
            bin/kronos-darwin-arm64
          sbom-path: bin/kronos-sbom.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Sign release artifacts
        run: ./scripts/sign-release.sh bin

      - name: Verify release signatures
        run: ./scripts/verify-signatures.sh bin

      - name: Import release tag public key
        if: startsWith(github.ref, 'refs/tags/')
        env:
          KRONOS_RELEASE_TAG_PUBLIC_KEY: ${{ secrets.KRONOS_RELEASE_TAG_PUBLIC_KEY }}
        run: |
          if [ -z "$KRONOS_RELEASE_TAG_PUBLIC_KEY" ]; then
            echo "KRONOS_RELEASE_TAG_PUBLIC_KEY secret is required for tagged releases" >&2
            exit 1
          fi
          printf '%s\n' "$KRONOS_RELEASE_TAG_PUBLIC_KEY" | gpg --batch --import

      - name: Archive release evidence
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          GH_ATTESTATION_REPO: ${{ github.repository }}
          KRONOS_RELEASE_TAG: ${{ github.ref_name }}
          KRONOS_REQUIRE_ATTESTATIONS: "1"
        run: |
          ./scripts/archive-release-evidence.sh bin "release-evidence/$GITHUB_REF_NAME"
          ./scripts/verify-release-evidence.sh "release-evidence/$GITHUB_REF_NAME"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: kronos-release-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          path: |
            bin/kronos-*

      - name: Upload release evidence
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: kronos-release-evidence-${{ github.ref_name }}
          path: release-evidence/${{ github.ref_name }}/

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" bin/kronos-* \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes "Kronos release $GITHUB_REF_NAME. Verify downloads with the attached .sha256 files, inspect kronos-provenance.json plus kronos-sbom.json for build metadata, and verify keyless signatures with the attached .bundle files."
